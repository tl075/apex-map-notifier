name: Apex Map Daily Notification
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Deps
        run: pip install requests
      - name: Run
        env:
          APEX_API_KEY: ${{ secrets.APEX_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python docs/apex_map_bot/map_notifier.py
